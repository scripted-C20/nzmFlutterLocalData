name: flutter_nzm
description: NZM Flutter client scaffold converted from the Electron project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_markdown: ^0.7.7+1
  shared_preferences: ^2.3.2
  file_picker: ^10.3.3
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  permission_handler: ^12.0.1
  qiniu_flutter_sdk: any
  qiniu_sdk_base: ^0.7.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo_gcd.png"
